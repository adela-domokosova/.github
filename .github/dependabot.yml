version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    
    schedule:
      interval: "monthly" 
      
    groups:
      github-actions-group:
        patterns:
          - "*" 
          
    ignore:
      - dependency-name: "*"
        update-types: 
          - "version-update:semver-minor"
          - "version-update:semver-patch"